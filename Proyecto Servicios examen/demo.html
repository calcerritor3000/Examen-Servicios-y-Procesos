<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demostración API - Proyecto Examen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #000000;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        h1 {
            color: white;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            transition: transform 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
        }

        .card h2 {
            color: #667eea;
            margin-bottom: 15px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .step {
            margin-bottom: 20px;
            padding: 15px;
            background: #f8f9fa;
            border-radius: 10px;
            border-left: 4px solid #667eea;
        }

        .step-number {
            display: inline-block;
            background: #667eea;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            text-align: center;
            line-height: 30px;
            margin-right: 10px;
            font-weight: bold;
        }

        .step-title {
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
        }

        .result {
            background: #e8f5e9;
            padding: 15px;
            border-radius: 8px;
            margin-top: 10px;
            border-left: 4px solid #4caf50;
        }

        .result.error {
            background: #ffebee;
            border-left-color: #f44336;
        }

        .result.success {
            background: #e8f5e9;
            border-left-color: #4caf50;
        }

        pre {
            background: #2d2d2d;
            color: #f8f8f2;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            margin-top: 10px;
            font-size: 0.9em;
        }

        .btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
            margin: 10px 5px;
            transition: background 0.3s;
        }

        .btn:hover {
            background: #5568d3;
        }

        .btn:disabled {
            background: #ccc;
            cursor: not-allowed;
        }

        .controls {
            text-align: center;
            margin-bottom: 30px;
        }

        .status {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin-left: 10px;
        }

        .status.online {
            background: #4caf50;
            color: white;
        }

        .status.offline {
            background: #f44336;
            color: white;
        }

        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-left: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .highlight {
            background: #fff3cd;
            padding: 2px 6px;
            border-radius: 4px;
            font-weight: bold;
        }

        .crypto-box {
            background: #1e1e1e;
            color: #4ec9b0;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
            word-break: break-all;
        }

        .hash-box {
            background: #1e1e1e;
            color: #ce9178;
            padding: 15px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            margin: 10px 0;
            word-break: break-all;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Demostración API - Proyecto Examen</h1>
        
        <div class="controls">
            <button class="btn" onclick="checkServer()">Verificar Servidor</button>
            <button class="btn" onclick="runDemo()">Ejecutar Demostración Completa</button>
            <span id="serverStatus" class="status offline">Servidor: Desconocido</span>
        </div>

        <div id="demoResults"></div>
    </div>

    <script>
        const API_BASE = 'http://localhost:3000';

        async function checkServer() {
            const statusEl = document.getElementById('serverStatus');
            statusEl.textContent = 'Verificando...';
            statusEl.className = 'status offline';
            
            try {
                const response = await fetch(API_BASE + '/');
                if (response.ok) {
                    statusEl.textContent = 'Servidor: Online ✅';
                    statusEl.className = 'status online';
                } else {
                    throw new Error('Servidor no responde');
                }
            } catch (error) {
                statusEl.textContent = 'Servidor: Offline ❌';
                statusEl.className = 'status offline';
                alert('⚠️ El servidor no está ejecutándose.\n\nEjecuta: node server.js');
            }
        }

        async function makeRequest(method, endpoint, data = null) {
            try {
                const options = {
                    method,
                    headers: { 'Content-Type': 'application/json' }
                };
                if (data) {
                    options.body = JSON.stringify(data);
                }
                const response = await fetch(API_BASE + endpoint, options);
                const result = await response.json();
                return { success: response.ok, data: result, status: response.status };
            } catch (error) {
                return { success: false, error: error.message };
            }
        }

        function createStep(number, title, content, isSuccess = true) {
            return `
                <div class="step">
                    <span class="step-number">${number}</span>
                    <span class="step-title">${title}</span>
                    <div class="result ${isSuccess ? 'success' : 'error'}">
                        ${content}
                    </div>
                </div>
            `;
        }

        async function runDemo() {
            const resultsEl = document.getElementById('demoResults');
            resultsEl.innerHTML = '<div class="loading"></div> Ejecutando demostración...';

            let html = '<div class="card"><h2>📡 Demostración Completa de la API</h2>';

            try {
                // 1. Info API
                const info = await makeRequest('GET', '/');
                if (info.success) {
                    html += createStep('1️⃣', 'Obteniendo información de la API', `
                        <strong>Mensaje:</strong> ${info.data.message}<br>
                        <strong>Versión:</strong> ${info.data.version}<br>
                        <strong>Endpoints disponibles:</strong>
                        <pre>${JSON.stringify(info.data.endpoints, null, 2)}</pre>
                    `);
                }

                // 2. Crear usuarios
                const user1 = await makeRequest('POST', '/api/usuarios', {
                    username: 'juan_perez',
                    email: 'juan@example.com',
                    password: 'password123'
                });
                if (user1.success) {
                    html += createStep('2️⃣', 'Creando usuarios', `
                        <strong>Usuario 1 creado:</strong><br>
                        <pre>${JSON.stringify(user1.data.usuario, null, 2)}</pre>
                    `);
                } else if (user1.data && user1.data.error === 'Email ya registrado') {
                    // Si el usuario ya existe, obtener los usuarios existentes
                    const usuarios = await makeRequest('GET', '/api/usuarios');
                    if (usuarios.success && usuarios.data.usuarios.length > 0) {
                        html += createStep('2️⃣', 'Creando usuarios', `
                            <strong>Usuarios ya existentes:</strong><br>
                            <pre>${JSON.stringify(usuarios.data.usuarios, null, 2)}</pre>
                        `);
                    }
                }

                const user2 = await makeRequest('POST', '/api/usuarios', {
                    username: 'maria_garcia',
                    email: 'maria@example.com',
                    password: 'securePass456'
                });
                if (user2.success) {
                    html += createStep('', 'Usuario 2 creado', `
                        <pre>${JSON.stringify(user2.data.usuario, null, 2)}</pre>
                    `);
                }

                // 3. Obtener usuarios
                const usuarios = await makeRequest('GET', '/api/usuarios');
                if (usuarios.success) {
                    html += createStep('3️⃣', 'Obteniendo todos los usuarios', `
                        <strong>Total usuarios:</strong> ${usuarios.data.usuarios.length}<br>
                        <pre>${JSON.stringify(usuarios.data.usuarios, null, 2)}</pre>
                    `);
                }

                // 4. Datos cifrados
                const datosSensibles = {
                    tarjeta: '1234-5678-9012-3456',
                    cvv: '123',
                    fechaVencimiento: '12/25'
                };
                const datosAlmacenados = await makeRequest('POST', '/api/usuarios/1/datos-cifrados', {
                    datos: datosSensibles
                });
                if (datosAlmacenados.success) {
                    html += createStep('4️⃣', 'Almacenando datos cifrados', `
                        <strong>Datos originales:</strong><br>
                        <pre>${JSON.stringify(datosSensibles, null, 2)}</pre>
                        <strong>✅ Datos cifrados y almacenados exitosamente</strong>
                    `);
                }

                // 5. Obtener datos descifrados
                const datosDescifrados = await makeRequest('GET', '/api/usuarios/1/datos-cifrados');
                if (datosDescifrados.success) {
                    html += createStep('5️⃣', 'Obteniendo y descifrando datos', `
                        <strong>✅ Datos descifrados correctamente:</strong><br>
                        <pre>${JSON.stringify(datosDescifrados.data.datos, null, 2)}</pre>
                        <p><span class="highlight">Demuestra cifrado/descifrado bidireccional</span></p>
                    `);
                }

                // 6. Cifrado/Descifrado
                const textoOriginal = 'Información confidencial del cliente';
                const resultadoCifrado = await makeRequest('POST', '/api/cifrado/encrypt', {
                    text: textoOriginal
                });
                if (resultadoCifrado.success) {
                    html += createStep('6️⃣', 'Demostrando cifrado y descifrado (AES-256-CBC)', `
                        <strong>Texto original:</strong> <span class="highlight">${resultadoCifrado.data.original}</span><br><br>
                        <strong>Texto cifrado:</strong>
                        <div class="crypto-box">${resultadoCifrado.data.encrypted}</div>
                        <strong>Texto descifrado:</strong> <span class="highlight">${resultadoCifrado.data.decrypted}</span><br><br>
                        <p><span class="highlight">✅ Demuestra ida y vuelta: cifra y descifra correctamente</span></p>
                    `);
                }

                // 7. Hashing
                const textoParaHash = 'Datos importantes para hashear';
                const resultadoHash = await makeRequest('POST', '/api/hashing/hash', {
                    text: textoParaHash
                });
                if (resultadoHash.success) {
                    html += createStep('7️⃣', 'Demostrando técnicas de hashing', `
                        <strong>Texto original:</strong> ${resultadoHash.data.original}<br><br>
                        <strong>Hash SHA-256:</strong>
                        <div class="hash-box">${resultadoHash.data.hashSHA256}</div>
                        <strong>Salt generado:</strong>
                        <div class="hash-box">${resultadoHash.data.salt}</div>
                        <strong>Hash con Salt:</strong>
                        <div class="hash-box">${resultadoHash.data.hashWithSalt}</div>
                        <strong>HMAC:</strong>
                        <div class="hash-box">${resultadoHash.data.hmac}</div>
                        <p><span class="highlight">✅ Demuestra: SHA-256, SHA-256 con Salt, y HMAC</span></p>
                    `);
                }

                // 8. Password hashing
                const password = 'miPasswordSegura123';
                const passwordHash = await makeRequest('POST', '/api/hashing/password', {
                    password: password
                });
                if (passwordHash.success && passwordHash.data.hash) {
                    html += createStep('8️⃣', 'Demostrando hashing de contraseñas', `
                        <strong>Contraseña original:</strong> <span class="highlight">${passwordHash.data.original}</span><br><br>
                        <strong>Hash generado:</strong>
                        <div class="hash-box">${passwordHash.data.hash}</div>
                        <p><span class="highlight">✅ Contraseña hasheada con salt</span></p>
                    `);

                    // 9. Verificar contraseña (solo si el hash se generó correctamente)
                    const verificacion = await makeRequest('POST', '/api/hashing/verify', {
                        password: password,
                        hash: passwordHash.data.hash
                    });
                    if (verificacion.success) {
                        html += createStep('9️⃣', 'Verificando contraseña contra hash', `
                            <strong>Contraseña verificada:</strong> <span class="highlight">${password}</span><br>
                            <strong>Hash usado:</strong> <div class="hash-box" style="font-size: 0.8em;">${passwordHash.data.hash}</div><br>
                            <strong>Resultado:</strong> 
                            <span class="highlight">${verificacion.data.isValid ? '✅ Contraseña VÁLIDA' : '❌ Contraseña INVÁLIDA'}</span><br>
                            <p>La verificación compara la contraseña con el hash almacenado</p>
                        `);
                    } else {
                        html += createStep('9️⃣', 'Verificando contraseña contra hash', `
                            <strong>Error:</strong> No se pudo verificar la contraseña<br>
                            <pre>${JSON.stringify(verificacion, null, 2)}</pre>
                        `, false);
                    }
                } else {
                    html += createStep('8️⃣', 'Demostrando hashing de contraseñas', `
                        <strong>Error:</strong> No se pudo generar el hash de la contraseña<br>
                        <pre>${JSON.stringify(passwordHash, null, 2)}</pre>
                    `, false);
                }

                html += `
                    <div class="step" style="background: #e3f2fd; border-left-color: #2196f3;">
                        <h3 style="color: #1976d2; margin-bottom: 10px;">✅ DEMOSTRACIÓN COMPLETADA</h3>
                        <p><strong>Todos los requisitos del examen han sido demostrados:</strong></p>
                        <ul style="margin-left: 20px; margin-top: 10px;">
                            <li>✅ Comunicación entre sistemas mediante APIs</li>
                            <li>✅ Rol de servidor y cliente</li>
                            <li>✅ Contrato API documentado</li>
                            <li>✅ Cifrado/descifrado bidireccional (AES-256-CBC)</li>
                            <li>✅ Técnicas de hashing (SHA-256, Salt, HMAC, Password)</li>
                        </ul>
                    </div>
                `;

            } catch (error) {
                html += createStep('❌', 'Error en la demostración', `
                    <strong>Error:</strong> ${error.message}<br>
                    <p>Asegúrate de que el servidor esté ejecutándose en http://localhost:3000</p>
                `, false);
            }

            html += '</div>';
            resultsEl.innerHTML = html;
        }

        // Verificar servidor al cargar
        window.onload = () => {
            checkServer();
        };
    </script>
</body>
</html>
